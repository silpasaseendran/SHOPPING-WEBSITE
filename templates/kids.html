{% extends 'base.html' %}
{% block title %} kids page {% endblock %}
{% block content %}
<div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://wallpapercave.com/wp/wp8575687.jpg" class="d-block w-100" alt="..." height="570px">
    </div>
    <div class="carousel-item">
      <img src="https://wallpapercave.com/wp/wp8575721.jpg" class="d-block w-100" alt="..." height="570px">
    </div>
    <div class="carousel-item">
      <img src="https://thumbs.dreamstime.com/b/group-portrait-happy-little-children-casual-clothes-having-fun-studio-boys-girls-friends-standing-sitting-227782036.jpg" class="d-block w-100" alt="..." height="570px">
    </div>
  </div>
</div>
<div class="container text-center">
  {% for i in kiddress %}
  <div class="cart text-center border border-3 border-white" style="width: 18rem;display:inline-block;height:500px">
  <img src="{{i.image}}" class="card-img-top" alt="..." height="360px">
  <div class="card-body">
    <h5 class="card-title">{{i.name}}</h5>
    <p class="card-text">Rs.{{i.price}}</p>
    <a href="#" class="btn btn-warning">Buy Now</a>
  </div>
  </div>{% endfor %}</div>
{% endblock %}
